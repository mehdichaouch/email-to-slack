name: 🧪 Tests

on:
  # Run on all pushes and on all pull requests.
  # Prevent the build from running when there are only irrelevant changes.
  push:
    paths-ignore:
      - '**.md'
      - '**.yml'
  pull_request:
  # Allow manually triggering the workflow.
  workflow_dispatch:

jobs:
  ### Runs PHPCompatibility over all PHP files.
  # Local equivalent: `composer phpcs:compatibility`
  phpcompatibility:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        php-versions: ['5.3', '5.4', '5.6', '7.0', '7.4', '8.0']
        experimental: [true]

#        include:
#          - php: '8.1'
#            experimental: true

    name: PHP Compatibility ${{ matrix.php-versions }}
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          ini-values: error_reporting=E_ALL, display_errors=On
          coverage: none
          tools: cs2pr

      # Install dependencies and handle caching in one go.
      # @link https://github.com/marketplace/actions/install-composer-dependencies
      - name: Install Composer dependencies
        uses: 'ramsey/composer-install@v1'

      - name: Validate composer.json and composer.lock
        run: composer validate

#      - name: Get Composer cache directory
#        id: composer-cache
#        run: |
#          echo "::set-output name=dir::$(composer config cache-files-dir)"

#      - name: Use composer cache
#        uses: actions/cache@v2
#        with:
#          path: ${{ steps.composer-cache.outputs.dir }}
#          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
#          restore-keys: |
#            ${{ runner.os }}-composer-

      - name: Tool versions
        run: |
          which php
          php --version
          which composer
          composer --version
          which jq
          jq --version
          composer phpcs:lint -- --config-show installed_paths

#      - name: Install dependencies
#        run: composer install

      - name: Run PHPCS for PHPCompatibility
        run: |
          composer phpcs:compatibility -- --report=emacs email-to-slack.php --runtime-set testVersion 5.3-8.0

#          echo "::add-matcher::.github/matchers/phpcs-problem-matcher.json"
#          composer phpcs:compatibility -- --report=emacs email-to-slack.php --runtime-set testVersion ${{ matrix.php-versions }}
